name: Trading Digest Agent

on:
  schedule:
    # EOD digest — 17:00 ET (21:00 UTC during EDT, 16:00 ET during EST — both after 15:30 EOD exit)
    - cron: '0 21 * * 1-5'
    # Morning briefing — 07:00 ET (11:00 UTC during EDT, 06:00 ET during EST)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Digest mode'
        required: true
        default: 'eod'
        type: choice
        options:
          - eod
          - morning
      date:
        description: 'Target date (YYYY-MM-DD), leave empty for today'
        required: false
        type: string
      dry_run:
        description: 'Dry run (skip Supabase write)'
        required: false
        default: false
        type: boolean

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: live_trading/requirements.txt

      - name: Install dependencies
        run: |
          pip install anthropic supabase

      - name: Determine mode from schedule
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "date_arg=${{ inputs.date && format('--date {0}', inputs.date) || '' }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ inputs.dry_run && '--dry-run' || '' }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 21 * * 1-5" ]; then
            echo "mode=eod" >> $GITHUB_OUTPUT
            echo "date_arg=" >> $GITHUB_OUTPUT
            echo "dry_run=" >> $GITHUB_OUTPUT
          else
            echo "mode=morning" >> $GITHUB_OUTPUT
            echo "date_arg=" >> $GITHUB_OUTPUT
            echo "dry_run=" >> $GITHUB_OUTPUT
          fi

      - name: Run Digest Agent
        working-directory: live_trading
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TZ: America/New_York
        run: |
          python -m agents.digest.cli \
            --mode ${{ steps.mode.outputs.mode }} \
            ${{ steps.mode.outputs.date_arg }} \
            ${{ steps.mode.outputs.dry_run }}
